name: Fiily Binary Release

# Builds standalone openclaw archives for distribution via Fiily's install wizard.
#
# Archive layout (no top-level dir, extracts directly into ~/.fiily/):
#
#   bin/
#     node          ← Node.js 24 binary
#     npm           ← npm (symlink on Unix, .cmd on Windows)
#     npx           ← npx (symlink on Unix, .cmd on Windows)
#     openclaw      ← launch wrapper (Unix shell script / .cmd on Windows)
#     .node-version ← bundled Node.js version string
#   lib/
#     node_modules/npm/   ← npm package (required by npm/npx on Unix)
#   openclaw/
#     openclaw.mjs
#     package.json
#     dist/
#     node_modules/  (production deps only)
#
# Install strategy (Rust side):
#   1. Extract archive to ~/.fiily/
#   2. Check if system already has node >= v24
#   3. YES → delete bundled bin/node, bin/npm, bin/npx, lib/  (use system node)
#   4. NO  → keep bundled node; add ~/.fiily/bin to shell PATH

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      node_bundle_version:
        description: "Node.js LTS version to bundle (e.g. 24.0.2)"
        required: false
        default: "24.0.2"
      bundle_node:
        description: "Bundle Node.js in the openclaw package (full package)"
        type: boolean
        required: false
        default: false

concurrency:
  group: fiily-binary-release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_BUILD_VERSION: "24.x"
  PNPM_VERSION: "10.32.1"
  NODE_BUNDLE_VERSION: ${{ inputs.node_bundle_version || '24.0.2' }}

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            os: darwin
            arch: arm64
            node_platform: darwin-arm64
          - runner: macos-14
            os: darwin
            arch: x64
            node_platform: darwin-x64
          - runner: ubuntu-22.04
            os: linux
            arch: x64
            node_platform: linux-x64
          - runner: windows-2022
            os: win32
            arch: x64
            node_platform: win-x64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js (build toolchain)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_BUILD_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Patch — trusted plugins allowlist
        run: node .github/fiily-patches/trusted-plugins.mjs

      - name: Bundle A2UI assets
        run: pnpm canvas:a2ui:bundle

      - name: Build (docker profile — skips canvas UI + type declarations)
        run: pnpm run build:docker

      - name: Build Control UI
        run: pnpm ui:build

      - name: Prune to production dependencies
        run: pnpm prune --production

      - name: Remove optional large dependencies (available for on-demand download)
        shell: bash
        run: |
          echo "Before cleanup:"
          du -sh node_modules/@node-llama-cpp node_modules/@lancedb node_modules/koffi 2>/dev/null || true
          rm -rf node_modules/@node-llama-cpp node_modules/node-llama-cpp
          rm -rf node_modules/@lancedb
          rm -rf node_modules/koffi
          echo "After cleanup:"
          du -sh node_modules 2>/dev/null || true

      # ── Unix (macOS / Linux) ─────────────────────────────────────────────
      - name: Package (Unix)
        if: matrix.os != 'win32'
        env:
          NODE_VER: ${{ env.NODE_BUNDLE_VERSION }}
          BUNDLE_NODE: ${{ inputs.bundle_node || 'false' }}
          NODE_PLATFORM: ${{ matrix.node_platform }}
          TARGET_OS: ${{ matrix.os }}
          TARGET_ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail

          VERSION=$(node -p "require('./package.json').version")
          ARCHIVE_NAME="openclaw-${VERSION}-${TARGET_OS}-${TARGET_ARCH}.tar.gz"
          NODE_ARCHIVE_NAME="node-${NODE_VER}-${TARGET_OS}-${TARGET_ARCH}.tar.gz"

          # ── 1. OpenClaw 包（不含 Node.js）──────────────────────────────
          STAGE="$(pwd)/.release-stage"
          rm -rf "${STAGE}"
          mkdir -p "${STAGE}/bin" "${STAGE}/openclaw"

          cp openclaw.mjs    "${STAGE}/openclaw/"
          cp package.json    "${STAGE}/openclaw/"
          cp -r dist         "${STAGE}/openclaw/dist"
          cp -r docs/reference/templates "${STAGE}/openclaw/docs/reference/templates"
          rsync -a --exclude='node_modules' --exclude='*.test.ts' --exclude='*.test.js' extensions/ "${STAGE}/openclaw/extensions/"
          find node_modules -type l ! -exec test -e {} \; -delete 2>/dev/null || true
          cp -r node_modules "${STAGE}/openclaw/node_modules"

          # openclaw wrapper (uses system node or bundled node if present)
          printf '%s\n' \
            '#!/bin/sh' \
            'SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"' \
            'if [ -x "${SCRIPT_DIR}/node" ]; then' \
            '  NODE="${SCRIPT_DIR}/node"' \
            'else' \
            '  NODE="$(command -v node 2>/dev/null || true)"' \
            '  if [ -z "${NODE}" ]; then' \
            '    echo "openclaw: node not found. Re-run '"'"'fiily install'"'"' or install Node.js >= 22." >&2' \
            '    exit 1' \
            '  fi' \
            'fi' \
            'exec "${NODE}" "${SCRIPT_DIR}/../openclaw/openclaw.mjs" "$@"' \
            > "${STAGE}/bin/openclaw"
          chmod +x "${STAGE}/bin/openclaw"

          # ── 可选：捆绑 Node.js（full 包）─────────────────────────────
          if [ "${BUNDLE_NODE}" = "true" ]; then
            mkdir -p "${STAGE}/lib"
            NODE_URL="https://nodejs.org/dist/v${NODE_VER}/node-v${NODE_VER}-${NODE_PLATFORM}.tar.gz"
            echo "Bundling Node.js ${NODE_VER} from: ${NODE_URL}"
            curl -fsSL "${NODE_URL}" -o /tmp/node-dist.tar.gz
            tar -xzf /tmp/node-dist.tar.gz --strip-components=1 -C "${STAGE}" \
              "node-v${NODE_VER}-${NODE_PLATFORM}/bin/node" \
              "node-v${NODE_VER}-${NODE_PLATFORM}/bin/npm" \
              "node-v${NODE_VER}-${NODE_PLATFORM}/bin/npx" \
              "node-v${NODE_VER}-${NODE_PLATFORM}/lib/node_modules/npm"
            chmod +x "${STAGE}/bin/node"
            echo "${NODE_VER}" > "${STAGE}/bin/.node-version"
            ARCHIVE_NAME="openclaw-${VERSION}-${TARGET_OS}-${TARGET_ARCH}-full.tar.gz"
          fi

          tar -czf "${ARCHIVE_NAME}" -C "${STAGE}" .
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"
          ls -lh "${ARCHIVE_NAME}"

      # ── Windows ──────────────────────────────────────────────────────────
      - name: Package (Windows)
        if: matrix.os == 'win32'
        env:
          NODE_VER: ${{ env.NODE_BUNDLE_VERSION }}
          BUNDLE_NODE: ${{ inputs.bundle_node || 'false' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $NV = $env:NODE_VER
          $VERSION = (Get-Content package.json | ConvertFrom-Json).version
          $ARCHIVE_NAME = "openclaw-${VERSION}-win32-x64.zip"
          $NODE_ARCHIVE_NAME = "node-${NV}-win32-x64.zip"

          # ── 1. OpenClaw 包（不含 Node.js）──────────────────────────────
          $STAGE = Join-Path (Get-Location) ".release-stage"
          Remove-Item -Recurse -Force $STAGE -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force "$STAGE\bin"     | Out-Null
          New-Item -ItemType Directory -Force "$STAGE\openclaw" | Out-Null

          Copy-Item openclaw.mjs "$STAGE\openclaw\"
          Copy-Item package.json "$STAGE\openclaw\"
          Copy-Item -Recurse dist         "$STAGE\openclaw\dist"
          Copy-Item -Recurse docs\reference\templates "$STAGE\openclaw\docs\reference\templates"
          robocopy extensions "$STAGE\openclaw\extensions" /E /XD node_modules /XF *.test.ts *.test.js /NFL /NDL /NJH /NJS; if ($LASTEXITCODE -le 7) { $LASTEXITCODE = 0 }
          Copy-Item -Recurse node_modules "$STAGE\openclaw\node_modules"

          # openclaw wrapper (.cmd)
          $lines = @(
            '@echo off',
            'set "SCRIPT_DIR=%~dp0"',
            'if exist "%SCRIPT_DIR%node.exe" (',
            '  set "NODE=%SCRIPT_DIR%node.exe"',
            ') else (',
            '  where node >nul 2>&1 || (',
            '    echo openclaw: node not found. Re-run "fiily install" or install Node.js ^>= 22. 1>&2',
            '    exit /b 1',
            '  )',
            '  set "NODE=node"',
            ')',
            '"%NODE%" "%SCRIPT_DIR%..\openclaw\openclaw.mjs" %*'
          )
          $lines -join "`r`n" | Set-Content "$STAGE\bin\openclaw.cmd"

          Push-Location $STAGE
          Compress-Archive -Path ".\*" -DestinationPath (Join-Path (Split-Path $STAGE) $ARCHIVE_NAME)
          Pop-Location
          # 可选：捆绑 Node.js（full 包）
          if ($env:BUNDLE_NODE -eq 'true') {
            $NODE_URL = "https://nodejs.org/dist/v${NV}/node-v${NV}-win-x64.zip"
            Write-Host "Bundling Node.js ${NV} from: $NODE_URL"
            Invoke-WebRequest -Uri $NODE_URL -OutFile "$env:TEMP\node-dist.zip"
            Expand-Archive -Path "$env:TEMP\node-dist.zip" -DestinationPath "$env:TEMP\node-extract" -Force
            $NODE_DIR = "$env:TEMP\node-extract\node-v${NV}-win-x64"
            Copy-Item "$NODE_DIR\node.exe"  "$STAGE\bin\node.exe"
            Copy-Item "$NODE_DIR\npm.cmd"   "$STAGE\bin\npm.cmd"
            Copy-Item "$NODE_DIR\npx.cmd"   "$STAGE\bin\npx.cmd"
            Copy-Item -Recurse "$NODE_DIR\node_modules\npm" "$STAGE\bin\node_modules\npm"
            Set-Content "$STAGE\bin\.node-version" $NV
            $ARCHIVE_NAME = "openclaw-${VERSION}-win32-x64-full.zip"
          }

          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $env:GITHUB_ENV
          Push-Location $STAGE
          Compress-Archive -Path ".\*" -DestinationPath (Join-Path (Split-Path $STAGE) $ARCHIVE_NAME) -Force
          Pop-Location
          Get-Item (Join-Path (Split-Path $STAGE) $ARCHIVE_NAME) | Select-Object Name, @{N='Size(MB)';E={[math]::Round($_.Length/1MB,1)}}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: openclaw-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ env.ARCHIVE_NAME }}
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    environment: release
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz,artifacts/*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}

      - name: Upload to Aliyun OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          if [ -z "$OSS_ACCESS_KEY_ID" ]; then
            echo "⚠️ OSS credentials not configured, skipping OSS upload"
            exit 0
          fi
          curl -fsSL https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash
          OSSUTIL="$(command -v ossutil || echo /usr/local/bin/ossutil)"
          "$OSSUTIL" config -e oss-cn-hangzhou.aliyuncs.com -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET"
          for f in artifacts/*; do
            echo "Uploading $(basename "$f") to OSS..."
            "$OSSUTIL" cp "$f" "oss://fiilyai/openclaw/$(basename "$f")" -f
          done
          echo "${{ github.ref_name }}" > /tmp/latest.txt
          "$OSSUTIL" cp /tmp/latest.txt "oss://fiilyai/openclaw/latest.txt" -f
          echo "✅ OSS upload complete"
